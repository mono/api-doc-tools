name: Build

on:
  push:
    branches: [ main, master, dev/** ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        configuration: [Release, Debug]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.x'
        
    - name: Restore dependencies
      run: dotnet restore apidoctools.sln
      
    - name: Build
      run: dotnet build apidoctools.sln -c ${{ matrix.configuration }} --no-restore
      
    - name: Pack NuGet packages
      run: dotnet pack src/mdoc/mdoc.csproj -o bin/Nuget -c ${{ matrix.configuration }} --no-build
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts-${{ matrix.os }}-${{ matrix.configuration }}
        path: |
          bin/Nuget/
        retention-days: 7
