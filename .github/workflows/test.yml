name: Tests

on:
  push:
    branches: [ main, master, dev/** ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        configuration: [Release, Debug]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.x'

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.x'

    - name: Install Mono (required for mdoc tests) - Ubuntu
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y mono-complete mono-mcs mono-vbnc

    - name: Install Mono (required for mdoc tests) - macOS
      if: matrix.os == 'macos-latest'
      run: |
        brew install mono

    - name: Restore dependencies
      run: dotnet restore apidoctools.sln

    - name: Build
      run: dotnet build apidoctools.sln -c ${{ matrix.configuration }} --no-restore

    - name: Run .NET tests
      run: dotnet test apidoctools.sln -c ${{ matrix.configuration }} --no-build --verbosity normal

    - name: Run mdoc tests
      shell: bash
      run: |
        cd tests/mdoc
        if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
          MONO_CMD=""
        else
          MONO_CMD="mono"
        fi
        make check -B MONO="$MONO_CMD" CONFIGURATION=${{ matrix.configuration }}
